<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focusly — ADHD Support</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'DM Sans',sans-serif;background:#FDF8F2;color:#2E1F0F}
#app{display:flex}

/* Sidebar */
#sidebar{
width:220px;background:#F2EBE0;height:100vh;
padding:20px;position:fixed;left:0;top:0
}
#sidebar button{
display:block;width:100%;margin-bottom:8px;
padding:10px;border:none;border-radius:8px;
background:transparent;cursor:pointer;text-align:left
}
#sidebar button.active{background:#FAEADE;color:#9E5636}

/* Main */
#main{margin-left:220px;padding:24px;flex:1}

/* Cards */
.card{
background:#fff;border-radius:14px;
padding:16px;margin-bottom:16px;
border:1px solid #E4D8C8
}

/* Buttons */
.btn{
padding:8px 14px;border:none;border-radius:8px;
background:#C4714A;color:#fff;cursor:pointer
}

/* Input */
input{
padding:8px;border-radius:8px;
border:1px solid #E4D8C8;width:100%
}

/* Task */
.task{
display:flex;justify-content:space-between;
padding:10px;border-radius:8px;
border:1px solid #E4D8C8;margin-bottom:8px
}
.task.done{opacity:.6;text-decoration:line-through}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h2 style="font-family:Lora;">Focusly</h2>
    <button onclick="navigate('dashboard')" id="nav-dashboard">Today</button>
    <button onclick="navigate('tasks')" id="nav-tasks">Tasks</button>
    <button onclick="navigate('focus')" id="nav-focus">Focus</button>
  </div>
  <div id="main"></div>
</div>
<script>
// ===== SAFE ERROR LOGGING =====
window.onerror = (m,s,l,c,e)=>console.error(m,l,c);

// ===== STATE =====
const S = JSON.parse(localStorage.getItem('focusly')) || {
  view:'dashboard',
  tasks:[],
  focus:{running:false,secs:1500}
};

// ===== SAVE =====
function save(){
  localStorage.setItem('focusly', JSON.stringify(S));
}

// ===== NAV =====
function navigate(v){
  S.view = v;
  render();
}

// ===== RENDER =====
function render(){
  save();

  document.querySelectorAll('#sidebar button').forEach(b=>b.classList.remove('active'));
  const navBtn = document.getElementById('nav-'+S.view);
  if(navBtn) navBtn.classList.add('active');

  const m = document.getElementById('main');
  m.innerHTML = '';

  if(S.view === 'dashboard') renderDashboard(m);
  if(S.view === 'tasks') renderTasks(m);
  if(S.view === 'focus') renderFocus(m);
}

// ===== DASHBOARD =====
function renderDashboard(m){
  const c = card();
  c.innerHTML = "<h2>Today</h2><p>Keep it simple. One thing at a time.</p>";
  m.appendChild(c);
}

// ===== TASKS =====
function renderTasks(m){
  const c = card();

  const input = document.createElement('input');
  input.placeholder = "Add a task...";
  
  const addBtn = button("Add", ()=>{
    if(!input.value.trim()) return;
    S.tasks.push({id:Date.now(),title:input.value,done:false});
    input.value="";
    render();
  });

  c.append(input, addBtn);

  S.tasks.forEach(t=>{
    const row = document.createElement('div');
    row.className = 'task' + (t.done?' done':'');
    
    const txt = document.createElement('span');
    txt.textContent = t.title;

    const actions = document.createElement('div');

    const doneBtn = button("✓", ()=>{
      t.done = !t.done;
      render();
    });

    const delBtn = button("✕", ()=>{
      S.tasks = S.tasks.filter(x=>x.id!==t.id);
      render();
    });

    actions.append(doneBtn, delBtn);
    row.append(txt, actions);
    c.appendChild(row);
  });

  m.appendChild(c);
}

// ===== FOCUS TIMER =====
let interval = null;

function renderFocus(m){
  const c = card();

  const time = document.createElement('h1');
  time.style.fontFamily = 'Lora';

  function update(){
    const min = Math.floor(S.focus.secs/60);
    const sec = S.focus.secs % 60;
    time.textContent = `${min}:${sec.toString().padStart(2,'0')}`;
  }

  update();

  const startBtn = button("Start", ()=>{
    if(interval) return;

    S.focus.running = true;

    interval = setInterval(()=>{
      S.focus.secs--;
      if(S.focus.secs <= 0){
        clearInterval(interval);
        interval = null;
        S.focus.running = false;
        S.focus.secs = 1500;
      }
      update();
      save();
    },1000);
  });

  const resetBtn = button("Reset", ()=>{
    clearInterval(interval);
    interval = null;
    S.focus.secs = 1500;
    update();
  });

  c.append(time, startBtn, resetBtn);
  m.appendChild(c);
}

// ===== HELPERS =====
function card(){
  const d = document.createElement('div');
  d.className='card';
  return d;
}

function button(text,fn){
  const b = document.createElement('button');
  b.className='btn';
  b.textContent=text;
  b.onclick=fn;
  return b;
}

// INIT
document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
