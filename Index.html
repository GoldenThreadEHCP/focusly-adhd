<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focusly — ADHD Support</title>

https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#FDF8F2;
  font-family:'DM Sans','Segoe UI',sans-serif;
  color:#2E1F0F;
  min-height:100vh
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#F2EBE0}
::-webkit-scrollbar-thumb{background:#E4D8C8;border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .35s ease both}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms!important;
    transition-duration:.01ms!important
  }
}

/* ── Layout ── */
#app{display:flex;min-height:100vh;position:relative}

/* Sidebar */
#sidebar{
  width:220px;
  background:#F2EBE0;
  border-right:1px solid #E4D8C8;
  display:flex;
  flex-direction:column;
  padding:24px 0;
  height:100vh;
  position:fixed;
  top:0;left:0;
  z-index:200;
  overflow-y:auto;
  transition:transform .28s,width .28s,box-shadow .28s
}
#sidebar.hidden{transform:translateX(-220px)}
#sidebar.floating{box-shadow:4px 0 24px rgba(60,30,10,.14)}

#main{
  flex:1;
  padding:32px 36px;
  max-width:900px;
  overflow-y:auto;
  transition:margin-left .28s;
  margin-left:0
}

#sb-overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:199;
  background:rgba(30,15,5,.25)
}
#sb-overlay.show{display:block}

#sb-toggle{
  position:fixed;
  top:18px;left:12px;
  z-index:300;
  width:36px;height:36px;
  border-radius:10px;
  border:1px solid #E4D8C8;
  background:#F2EBE0;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Sidebar internals */
.sb-brand{
  padding:0 20px 24px;
  display:flex;
  align-items:center;
  gap:10px
}
.sb-icon{
  width:34px;height:34px;
  background:#C4714A;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center
}
.sb-name{
  font-family:'Lora',Georgia,serif;
  font-weight:700;
  font-size:16px
}
.sb-sub{font-size:11px;color:#A08B76}

.nav-btn{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:10px;
  background:transparent;
  border:none;
  cursor:pointer;
  font-size:14px;
  color:#6B5240
}
.nav-btn:hover{background:#E4D8C8}
.nav-btn.active{background:#FAEADE;color:#9E5636;font-weight:600}

.card{
  background:#fff;
  border-radius:16px;
  border:1px solid #E4D8C8;
  box-shadow:0 2px 12px rgba(60,30,10,.08)
}
</style>
</head>

<body>

<button id="sb-toggle" onclick="sbToggle()" aria-label="Toggle navigation">
  ☰
</button>

<div id="sb-overlay" onclick="sbToggle()"></div>

<div id="app">
<nav id="sidebar">
  <div class="sb-brand">
    <div class="sb-icon">🧠</div>
    <div>
      <div class="sb-name">Focusly</div>
      <div class="sb-sub">ADHD Support</div>
    </div>
  </div>

  <div style="padding:0 12px">
    <button class="nav-btn active" data-view="dashboard" onclick="navigate('dashboard')">Today</button>
    <button class="nav-btn" data-view="tasks" onclick="navigate('tasks')">Tasks</button>
    <button class="nav-btn" data-view="projects" onclick="navigate('projects')">Projects</button>
    <button class="nav-btn" data-view="focus" onclick="navigate('focus')">Focus</button>
    <button class="nav-btn" data-view="reminders" onclick="navigate('reminders')">Reminders</button>
    <button class="nav-btn" data-view="sleep" onclick="navigate('sleep')">Sleep</button>
    <button class="nav-btn" data-view="toolkit" onclick="navigate('toolkit')">Toolkit</button>
  </div>
</nav>

<main id="main"></main>
</div>

<div id="modal-root"></div>

<script>
/* ─── State ─────────────────────────────────────────────── */
const S = {
  view: 'dashboard',
  tasks: [
    { id: 1, title: 'Complete monthly report', done: false, subtasks: [] },
    { id: 2, title: 'Book GP appointment', done: false, subtasks: [] },
    { id: 3, title: 'Renew car insurance', done: true, subtasks: [] }
  ]
};

/* ─── Navigation ───────────────────────────────────────── */
function navigate(v){
  S.view = v;
  document.querySelectorAll('.nav-btn')
    .forEach(b => b.classList.toggle('active', b.dataset.view === v));
  render();
}

/* ─── Rendering ────────────────────────────────────────── */
function render(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  if(S.view === 'dashboard'){
    main.innerHTML = '<h1>Dashboard</h1><p>You are doing great today.</p>';
  }
  if(S.view === 'tasks'){
    const ul = document.createElement('ul');
    S.tasks.forEach(t=>{
      const li = document.createElement('li');
      li.textContent = t.title + (t.done ? ' ✅' : '');
      ul.appendChild(li);
    });
    main.appendChild(ul);
  }
}

/* ─── Sidebar ──────────────────────────────────────────── */
let sbOpen = true;

function sbToggle(){
  sbOpen = !sbOpen;
  document.getElementById('sidebar').classList.toggle('hidden', !sbOpen);
}

/* ─── Init ─────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
