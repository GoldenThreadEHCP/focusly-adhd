<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focusly — ADHD Support</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── THEME VARIABLES ──────────────────────────────────────── */
:root{
  --bg:#FDF8F2; --bg-alt:#F2EBE0; --card:#FFFFFF;
  --text:#2E1F0F; --mid:#6B5240; --muted:#A08B76;
  --accent:#C4714A; --alight:#FAEADE; --adark:#9E5636;
  --green:#4E8B6A; --glight:#E0F0E8;
  --purple:#7065A8; --plight:#ECEAF8;
  --amber:#C89030; --amlight:#FBF2DC;
  --rose:#C45A7A; --rlight:#FAEAF0;
  --border:#E4D8C8; --shadow:0 2px 12px rgba(60,30,10,.08);
  --shadow-lg:0 8px 32px rgba(60,30,10,.12);
}
body.dark{
  --bg:#131008; --bg-alt:#1C1710; --card:#231B13;
  --text:#F0E6D2; --mid:#B89070; --muted:#6A5040;
  --accent:#D4845A; --alight:#3A2015; --adark:#F0A070;
  --green:#5A9E7A; --glight:#152820;
  --purple:#9080C8; --plight:#1E1A30;
  --amber:#D4A840; --amlight:#2A2010;
  --rose:#D06888; --rlight:#281018;
  --border:#3A2C20; --shadow:0 2px 12px rgba(0,0,0,.3);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
}

/* ── RESET & BASE ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(–bg);font-family:‘DM Sans’,‘Segoe UI’,sans-serif;color:var(–text);min-height:100vh;transition:background .25s,color .25s}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(–bg-alt)}
::-webkit-scrollbar-thumb{background:var(–border);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.fade-up{animation:fadeUp .3s ease both}
.shake{animation:shake .4s ease}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ── LOGIN PAGE ───────────────────────────────────────────── */
#login-page{
display:none;position:fixed;inset:0;z-index:500;
background:var(–bg);align-items:center;justify-content:center;padding:20px;
}
#login-page.show{display:flex}
.login-card{
background:var(–card);border-radius:24px;border:1px solid var(–border);
box-shadow:var(–shadow-lg);width:100%;max-width:400px;padding:40px;
}
.login-logo{width:48px;height:48px;background:var(–accent);border-radius:14px;
display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.login-title{font-family:‘Lora’,Georgia,serif;font-size:24px;font-weight:700;text-align:center;color:var(–text)}
.login-sub{font-size:13px;color:var(–muted);text-align:center;margin:6px 0 28px}
.login-field{margin-bottom:14px}
.login-label{font-size:12px;color:var(–mid);font-weight:600;display:block;margin-bottom:5px}
.login-input{
width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(–border);
background:var(–bg);font-family:‘DM Sans’,sans-serif;font-size:14px;color:var(–text);
outline:none;transition:border-color .2s;
}
.login-input:focus{border-color:var(–accent)}
.login-err{font-size:12px;color:var(–rose);margin-top:8px;min-height:16px;text-align:center}
.login-switch{text-align:center;margin-top:18px;font-size:13px;color:var(–muted)}
.login-switch a{color:var(–accent);cursor:pointer;font-weight:600;text-decoration:none}
.login-switch a:hover{text-decoration:underline}
.login-note{margin-top:20px;padding:10px 12px;border-radius:8px;background:var(–bg-alt);
font-size:11px;color:var(–muted);line-height:1.5;text-align:center}

/* ── APP SHELL ────────────────────────────────────────────── */
#app-shell{display:none}
#app-shell.show{display:block}

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sidebar{
position:fixed;top:0;left:0;height:100vh;width:190px;z-index:200;
background:var(–bg-alt);border-right:1px solid var(–border);
display:flex;flex-direction:column;padding:20px 0;
overflow-y:auto;overflow-x:hidden;
transition:transform .28s cubic-bezier(.4,0,.2,1),background .25s,border-color .25s;
}
#sidebar.collapsed{transform:translateX(-190px)}
#sidebar.floating{box-shadow:6px 0 28px rgba(60,30,10,.15)}
body.dark #sidebar.floating{box-shadow:6px 0 28px rgba(0,0,0,.5)}

/* ── OVERLAY ─────────────────────────────────────────────── */
#sb-overlay{display:none;position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.35);backdrop-filter:blur(2px)}
#sb-overlay.show{display:block}

/* ── HAMBURGER ───────────────────────────────────────────── */
#sb-toggle{
position:fixed;top:14px;z-index:300;width:34px;height:34px;border-radius:9px;
border:1px solid var(–border);background:var(–bg-alt);cursor:pointer;
display:flex;align-items:center;justify-content:center;
box-shadow:var(–shadow);transition:left .28s cubic-bezier(.4,0,.2,1),background .15s,border-color .25s;
}
#sb-toggle:hover{background:var(–border)}

/* ── DARK MODE BUTTON ────────────────────────────────────── */
#dark-btn{
position:fixed;top:14px;right:14px;z-index:300;width:34px;height:34px;border-radius:9px;
border:1px solid var(–border);background:var(–bg-alt);cursor:pointer;
display:none;align-items:center;justify-content:center;
box-shadow:var(–shadow);transition:background .15s,border-color .25s;
}
#dark-btn.show{display:flex}
#dark-btn:hover{background:var(–border)}

/* ── MAIN ────────────────────────────────────────────────── */
#main{min-height:100vh;padding:32px 36px 60px;max-width:880px;transition:margin-left .28s cubic-bezier(.4,0,.2,1)}

/* ── SIDEBAR INTERNALS ───────────────────────────────────── */
.sb-brand{padding:0 14px 20px;display:flex;align-items:center;gap:9px}
.sb-logo{width:32px;height:32px;background:var(–accent);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-name{font-family:‘Lora’,Georgia,serif;font-weight:700;font-size:14px;color:var(–text)}
.sb-app-sub{font-size:10px;color:var(–muted)}
.sb-pin{width:24px;height:24px;border-radius:7px;border:1px solid var(–border);background:transparent;
cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;
transition:all .15s;color:var(–muted)}
.sb-pin:hover{background:var(–border)}
.sb-pin.on{background:var(–alight);border-color:var(–accent);color:var(–accent)}
.sb-nav{flex:1;padding:0 8px;display:flex;flex-direction:column;gap:1px}
.nav-btn{
display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;border:none;
cursor:grab;width:100%;text-align:left;background:transparent;color:var(–mid);
font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:400;
transition:all .15s;user-select:none;
}
.nav-btn:hover{background:var(–border)}
.nav-btn.active{background:var(–alight);color:var(–adark);font-weight:600}
.nav-btn.drag-over{background:var(–alight);outline:2px dashed var(–accent)}
.nav-btn.dragging{opacity:.4}
.sb-foot{padding:14px 14px 0;border-top:1px solid var(–border)}
.sb-foot-tip{font-size:10px;color:var(–muted);line-height:1.5;margin-bottom:10px}
.sb-foot-actions{display:flex;gap:6px}
.sb-foot-btn{flex:1;padding:7px 6px;border-radius:8px;border:1px solid var(–border);background:transparent;
cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:11px;color:var(–mid);
display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.sb-foot-btn:hover{background:var(–border)}

/* ── CARDS ───────────────────────────────────────────────── */
.card{background:var(–card);border-radius:16px;border:1px solid var(–border);
box-shadow:var(–shadow);transition:background .25s,border-color .25s}

/* Drag handle on sections */
.drag-section{position:relative}
.drag-section .drag-handle{
position:absolute;top:10px;right:10px;cursor:grab;font-size:15px;color:var(–muted);
opacity:0;transition:opacity .15s;z-index:5;line-height:1;
width:24px;height:24px;display:flex;align-items:center;justify-content:center;
border-radius:6px;background:var(–bg-alt);border:1px solid var(–border);
}
.drag-section:hover .drag-handle{opacity:1}
.drag-section.drag-over{outline:2px dashed var(–accent);border-radius:16px}
.drag-section.dragging{opacity:.45}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;
font-family:‘DM Sans’,sans-serif;font-weight:500;cursor:pointer;
transition:opacity .18s;border:none;font-size:14px;padding:10px 20px}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(–accent);color:#fff}
.btn-secondary{background:var(–bg-alt);color:var(–text);border:1px solid var(–border)}
.btn-ghost{background:transparent;color:var(–mid)}
.btn-green{background:var(–green);color:#fff}
.btn-sm{padding:6px 14px!important;font-size:13px!important}
.btn-full{width:100%;justify-content:center;margin-top:6px}

/* ── BADGE ───────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.04em}

/* ── INPUTS ──────────────────────────────────────────────── */
input[type=text],input[type=password],textarea,select{
width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(–border);
background:var(–bg);font-family:‘DM Sans’,sans-serif;font-size:14px;color:var(–text);
outline:none;transition:border-color .2s,background .25s}
input[type=text]:focus,input[type=password]:focus,textarea:focus{border-color:var(–accent)}
input[type=time]{padding:8px 12px;border-radius:8px;border:1px solid var(–border);
background:var(–bg);font-family:‘DM Sans’,sans-serif;font-size:15px;color:var(–text);outline:none}
textarea{resize:vertical}
select{cursor:pointer}

/* ── TOGGLE SWITCH ───────────────────────────────────────── */
.tog{width:44px;height:24px;border-radius:999px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog-dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;
display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.modal-box{background:var(–card);border-radius:20px;width:100%;max-height:88vh;
overflow-y:auto;box-shadow:var(–shadow-lg);animation:fadeUp .3s ease;transition:background .25s}
.modal-head{display:flex;align-items:center;justify-content:space-between;
padding:18px 22px;border-bottom:1px solid var(–border)}
.modal-head h3{font-family:‘Lora’,Georgia,serif;font-size:17px;font-weight:600;color:var(–text)}
.modal-close{background:none;border:none;cursor:pointer;color:var(–muted);padding:4px;display:flex;align-items:center}
.modal-body{padding:20px 22px}

/* ── CHECKBOX ────────────────────────────────────────────── */
.cb{width:22px;height:22px;border-radius:6px;border:2px solid var(–border);background:transparent;
cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb.on{background:var(–green);border-color:var(–green)}
.cb-sm{width:18px;height:18px;border-radius:4px}

/* ── ICON BUTTON ─────────────────────────────────────────── */
.icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(–border);background:var(–bg);
cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;color:var(–muted)}
.icon-btn:hover{background:var(–bg-alt)}

/* ── TIP PILL ────────────────────────────────────────────── */
.tip-pill{padding:6px 12px;border-radius:999px;border:1px solid var(–border);background:var(–bg);
font-size:12px;color:var(–mid);cursor:pointer;display:inline-flex;align-items:center;gap:6px;
font-family:‘DM Sans’,sans-serif;transition:background .15s}
.tip-pill:hover{background:var(–bg-alt)}

/* ── CALENDAR CARD ───────────────────────────────────────── */
.cal-service{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
border:1px solid var(–border);background:var(–bg);margin-bottom:8px;transition:background .15s}
.cal-service:hover{background:var(–bg-alt)}
.cal-service-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
justify-content:center;font-size:20px;flex-shrink:0}
.cal-service-info{flex:1}
.cal-service-name{font-size:14px;font-weight:500;color:var(–text)}
.cal-service-desc{font-size:11px;color:var(–muted);margin-top:2px}

/* ── USER AVATAR ─────────────────────────────────────────── */
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(–accent);
display:flex;align-items:center;justify-content:center;color:#fff;
font-size:12px;font-weight:700;flex-shrink:0;cursor:pointer;
transition:opacity .2s;user-select:none}
.user-avatar:hover{opacity:.85}

@media(max-width:700px){
#main{padding:16px 14px 60px}
#dark-btn{top:14px;right:54px}
}
</style>

</head>
<body>

<!-- ════════════════════════════════════════════════════
     LOGIN PAGE
     ════════════════════════════════════════════════════ -->

<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 007 4.5v.05A2.5 2.5 0 004.55 7H4.5A2.5 2.5 0 002 9.5v1A2.5 2.5 0 004.5 13h.05A2.5 2.5 0 007 15.5v.05A2.5 2.5 0 009.5 18H10v1a1 1 0 002 0v-1h.5A2.5 2.5 0 0015 15.55V15.5A2.5 2.5 0 0017.5 13h.05A2.5 2.5 0 0020 10.5v-1A2.5 2.5 0 0017.5 7h-.05A2.5 2.5 0 0015 4.55V4.5A2.5 2.5 0 0012.5 2h-3z"/></svg>
    </div>
    <h1 class="login-title" id="login-title">Welcome back</h1>
    <p class="login-sub" id="login-sub">Sign in to your Focusly account</p>
    <div id="login-name-field" class="login-field" style="display:none">
      <label class="login-label">Your first name</label>
      <input class="login-input" id="login-name" type="text" placeholder="e.g. Sarah" autocomplete="given-name">
    </div>
    <div class="login-field">
      <label class="login-label">Email</label>
      <input class="login-input" id="login-email" type="text" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label class="login-label">Password</label>
      <input class="login-input" id="login-pw" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="btn btn-primary btn-full" id="login-submit-btn" onclick="authSubmit()">Sign in</button>
    <p class="login-switch">
      <span id="login-switch-text">Don't have an account?</span>
      <a id="login-switch-link" onclick="authToggle()"> Create one</a>
    </p>
    <p class="login-note">🔒 Your data stays on this device. Password is hashed before storing — never sent anywhere.</p>
  </div>
</div>

<!-- ════════════════════════════════════════════════════
     APP SHELL
     ════════════════════════════════════════════════════ -->

<div id="app-shell">

  <!-- Sidebar toggle -->

  <button id="sb-toggle" aria-label="Toggle menu" onclick="sbToggle()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--mid)" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <!-- Dark mode toggle -->

  <button id="dark-btn" class="show" aria-label="Toggle dark mode" onclick="toggleDark()">
    <svg id="dark-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--mid)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </svg>
  </button>

  <!-- Overlay -->

  <div id="sb-overlay" onclick="sbToggle()"></div>

  <!-- Sidebar -->

  <nav id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 007 4.5v.05A2.5 2.5 0 004.55 7H4.5A2.5 2.5 0 002 9.5v1A2.5 2.5 0 004.5 13h.05A2.5 2.5 0 007 15.5v.05A2.5 2.5 0 009.5 18H10v1a1 1 0 002 0v-1h.5A2.5 2.5 0 0015 15.55V15.5A2.5 2.5 0 0017.5 13h.05A2.5 2.5 0 0020 10.5v-1A2.5 2.5 0 0017.5 7h-.05A2.5 2.5 0 0015 4.55V4.5A2.5 2.5 0 0012.5 2h-3z"/></svg>
      </div>
      <div style="flex:1;min-width:0">
        <div class="sb-name">Focusly</div>
        <div class="sb-app-sub">ADHD Support</div>
      </div>
      <button class="sb-pin" id="sb-pin" onclick="sbPin()" title="Pin sidebar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </button>
    </div>
    <div class="sb-nav" id="sb-nav">
      <!-- Nav items injected by JS so order persists from localStorage -->
    </div>
    <div class="sb-foot">
      <p class="sb-foot-tip">💡 One thing at a time is progress.</p>
      <div class="sb-foot-actions">
        <button class="sb-foot-btn" onclick="goTo('settings')" title="Settings">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          Settings
        </button>
        <button class="sb-foot-btn" onclick="authLogout()" title="Sign out">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div>
    </div>
  </nav>

  <!-- Main content -->

  <main id="main"></main>
</div>

<!-- Modal root -->

<div id="modal-root"></div>

<script>
'use strict';

// ════════════════════════════════════════════════════════
//  SVG ICONS
// ════════════════════════════════════════════════════════
var IC = {
  info:    '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
  plus:    '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  check:   '<polyline points="20 6 9 17 5 12"/>',
  trash:   '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/>',
  chevD:   '<polyline points="6 9 12 15 18 9"/>',
  chevR:   '<polyline points="9 18 15 12 9 6"/>',
  play:    '<polygon points="5 3 19 12 5 21 5 3"/>',

var AUTH_MODE = 'login'; // 'login' | 'register'

async function hashPw(pw) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
function getStoredUser() { return JSON.parse(localStorage.getItem('focusly_user')||'null'); }
function getSession()    { return JSON.parse(sessionStorage.getItem('focusly_sess')||'null'); }
function saveSession(u)  { sessionStorage.setItem('focusly_sess', JSON.stringify(u)); }
function clearSession()  { sessionStorage.removeItem('focusly_sess'); }

function authToggle() {
  AUTH_MODE = AUTH_MODE === 'login' ? 'register' : 'login';
  var isReg = AUTH_MODE === 'register';
  document.getElementById('login-title').textContent      = isReg ? 'Create account' : 'Welcome back';
  document.getElementById('login-sub').textContent        = isReg ? 'Set up your Focusly account' : 'Sign in to your Focusly account';
  document.getElementById('login-name-field').style.display = isReg ? 'block' : 'none';
  document.getElementById('login-submit-btn').textContent = isReg ? 'Create account' : 'Sign in';
  document.getElementById('login-switch-text').textContent = isReg ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('login-switch-link').textContent = isReg ? ' Sign in' : ' Create one';
  document.getElementById('login-err').textContent = '';
}

async function authSubmit() {
  var email = document.getElementById('login-email').value.trim();
  var pw    = document.getElementById('login-pw').value;
  var name  = document.getElementById('login-name').value.trim();
  var errEl = document.getElementById('login-err');
  errEl.textContent = '';

  if (!email || !pw) { errEl.textContent = 'Please fill in all fields.'; return; }
  if (pw.length < 6)  { errEl.textContent = 'Password must be at least 6 characters.'; return; }

  var btn2 = document.getElementById('login-submit-btn');
  btn2.disabled = true; btn2.textContent = 'Please wait...';

  var hash = await hashPw(pw);

  if (AUTH_MODE === 'register') {
    if (!name) { errEl.textContent = 'Please enter your name.'; btn2.disabled=false; btn2.textContent='Create account'; return; }
    var existing = getStoredUser();
    if (existing && existing.email === email) { errEl.textContent = 'An account with that email already exists.'; btn2.disabled=false; btn2.textContent='Create account'; return; }
    var user = {name:name, email:email, hash:hash};
    localStorage.setItem('focusly_user', JSON.stringify(user));
    saveSession(user);
    bootApp(user);
  } else {
    var stored = getStoredUser();
    if (!stored || stored.email !== email) {
      var card = document.querySelector('.login-card');
      card.classList.add('shake'); setTimeout(function(){card.classList.remove('shake');},500);
      errEl.textContent = 'No account found with that email.'; btn2.disabled=false; btn2.textContent='Sign in'; return;
    }
    if (stored.hash !== hash) {
      var card2 = document.querySelector('.login-card');
      card2.classList.add('shake'); setTimeout(function(){card2.classList.remove('shake');},500);
      errEl.textContent = 'Incorrect password.'; btn2.disabled=false; btn2.textContent='Sign in'; return;
    }
    saveSession(stored);
    bootApp(stored);
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('login-page').classList.contains('show')) authSubmit();
});

function authLogout() {
  clearSession();
  document.getElementById('app-shell').classList.remove('show');
  document.getElementById('login-page').classList.add('show');
  AUTH_MODE = 'login';
  document.getElementById('login-title').textContent = 'Welcome back';
  document.getElementById('login-sub').textContent = 'Sign in to your Focusly account';
  document.getElementById('login-name-field').style.display = 'none';
  document.getElementById('login-submit-btn').textContent = 'Sign in';
  document.getElementById('login-submit-btn').disabled = false;
  document.getElementById('login-err').textContent = '';
  document.getElementById('login-email').value = '';
  document.getElementById('login-pw').value = '';
}

function buildSidebarNav() {
  var nav = document.getElementById('sb-nav');
  nav.innerHTML = '';
  NAV_ORDER.forEach(function(id) {
    var item = NAV_DEFAULTS.find(function(n){return n.id===id;});
    if (!item) return;
    var b = document.createElement('button');
    b.className = 'nav-btn' + (S.view === id ? ' active' : '');
    b.dataset.view = id;
    b.setAttribute('draggable', 'true');
    b.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+item.svg+'</svg>'+item.label;
    b.onclick   = function(){ goTo(id); };
    // Drag events
    b.addEventListener('dragstart', navDragStart);
    b.addEventListener('dragover',  navDragOver);
    b.addEventListener('dragleave', navDragLeave);
    b.addEventListener('drop',      navDrop);
    b.addEventListener('dragend',   navDragEnd);
    nav.appendChild(b);
  });
}

var _navDragSrc = null;
function navDragStart(e) { _navDragSrc = this; this.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain', this.dataset.view); }
function navDragOver(e)  { e.preventDefault(); if(this!==_navDragSrc) this.classList.add('drag-over'); }
function navDragLeave()  { this.classList.remove('drag-over'); }
function navDragEnd()    { this.classList.remove('dragging'); }
function navDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  var src = e.dataTransfer.getData('text/plain'), tgt = this.dataset.view;
  if (src === tgt) return;
  var si = NAV_ORDER.indexOf(src), ti = NAV_ORDER.indexOf(tgt);
  NAV_ORDER.splice(si,1); NAV_ORDER.splice(ti,0,src);
  localStorage.setItem('focusly_nav_order', JSON.stringify(NAV_ORDER));

}

// Draggable section wrapper
function dragSection(id, content) {
  var w = document.createElement('div');
  w.className = 'drag-section';
  w.setAttribute('draggable','true');
  w.dataset.sid = id;
  var handle = document.createElement('div');
  handle.className = 'drag-handle';
  handle.innerHTML = '⠿';
  handle.title = 'Drag to reorder';
  w.appendChild(handle);
  w.appendChild(content);
  w.addEventListener('dragstart', function(e){ _secDragSrc=id; w.classList.add('dragging'); e.dataTransfer.setData('text/plain',id); });
  w.addEventListener('dragend',   function(){ w.classList.remove('dragging'); });
  w.addEventListener('dragover',  function(e){ e.preventDefault(); if(id!==_secDragSrc) w.classList.add('drag-over'); });
  w.addEventListener('dragleave', function(){ w.classList.remove('drag-over'); });
  w.addEventListener('drop',      function(e){
    e.preventDefault(); w.classList.remove('drag-over');
    var src=e.dataTransfer.getData('text/plain'), tgt=id;
    if(src===tgt)return;
    var si=DASH_ORDER.indexOf(src), ti=DASH_ORDER.indexOf(tgt);
    DASH_ORDER.splice(si,1); DASH_ORDER.splice(ti,0,src);
    localStorage.setItem('focusly_dash_order',JSON.stringify(DASH_ORDER));
    renderView();
  });
  return w;
}

  head.appendChild(cl); var body=document.createElement('div'); body.className='modal-body';
  fn(body); box.appendChild(head); box.appendChild(body); bg.appendChild(box); root.appendChild(bg);
}

function pad2(n){return String(n).padStart(2,'0');}
function icsDate(dateObj){
  return dateObj.getFullYear()+pad2(dateObj.getMonth()+1)+pad2(dateObj.getDate())+'T'+pad2(dateObj.getHours())+pad2(dateObj.getMinutes())+'00';
}
function exportICS(remindersArr) {
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Focusly//ADHD Support//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  remindersArr.filter(function(r){return r.active;}).forEach(function(r){
    var now=new Date(); var start=new Date();
    if(r.time && r.time.includes(':')){ var parts=r.time.split(':'); start.setHours(+parts[0],+parts[1],0); }
    if(start<now) start.setDate(start.getDate()+1);
    var end=new Date(start.getTime()+15*60000);
    var uid='focusly-'+r.id+'-'+Date.now()+'@focusly.app';
    lines.push('BEGIN:VEVENT','UID:'+uid,'DTSTAMP:'+icsDate(now),'DTSTART:'+icsDate(start),'DTEND:'+icsDate(end),'SUMMARY:'+r.emoji+' '+r.label,'DESCRIPTION:Focusly reminder — '+r.label,'BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:'+r.label,'TRIGGER:-PT0M','END:VALARM');
    if(r.repeat==='Daily') lines.push('RRULE:FREQ=DAILY');
    else if(r.repeat==='Weekdays') lines.push('RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR');
    else if(r.repeat==='Weekends') lines.push('RRULE:FREQ=WEEKLY;BYDAY=SA,SU');
    else if(r.repeat==='Weekly') lines.push('RRULE:FREQ=WEEKLY');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='focusly-reminders.ics'; a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}
function openGCalReminder(r) {
  var now=new Date(); var start=new Date();
  if(r.time&&r.time.includes(':')){ var parts=r.time.split(':'); start.setHours(+parts[0],+parts[1],0); }
  if(start<now) start.setDate(start.getDate()+1);
  var end=new Date(start.getTime()+15*60000);
  function fmt(d){return d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+'T'+pad2(d.getHours())+pad2(d.getMinutes())+'00Z';}
  var url='https://calendar.google.com/calendar/r/eventedit?text='+encodeURIComponent(r.emoji+' '+r.label)+'&dates='+fmt(start)+'/'+fmt(end)+'&details='+encodeURIComponent('Created by Focusly ADHD Support')+'&recur=RRULE:FREQ='+(r.repeat==='Daily'?'DAILY':r.repeat==='Weekdays'?'WEEKLY;BYDAY=MO,TU,WE,TH,FR':'WEEKLY');
  window.open(url,'_blank');
}

function bootApp(user) {
  S.currentUser = user;
  document.getElementById('login-page').classList.remove('show');
  document.getElementById('app-shell').classList.add('show');
  buildSidebarNav();
  if (window.innerWidth < 700) { SB.open=false; SB.pinned=false; }
  sbApply();
  renderView();
}

document.addEventListener('DOMContentLoaded', function() {
  applyTheme();
  var sess = getSession();
  if (sess) {
    bootApp(sess);
  } else {
    document.getElementById('login-page').classList.add('show');
  }
});
