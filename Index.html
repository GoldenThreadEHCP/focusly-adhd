<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focusly — ADHD Support</title>

<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:'DM Sans',sans-serif;background:#FDF8F2;margin:0}
#main{padding:20px}
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:16px;margin-bottom:16px}
.btn{padding:10px 16px;border:none;border-radius:8px;background:#C4714A;color:#fff;cursor:pointer}
</style>
</head>

<body>

<div id="main"></div>

<script>
// ===== ERROR LOGGING =====
window.onerror = function(msg, src, line, col, err){
  console.error("Error:", msg, "at", line+":"+col);
};

// ===== STATE =====
const S = {
  view: 'dashboard',
  tasks: [
    {id:1,title:'Test task',done:false}
  ]
};

// ===== NAV =====
function navigate(v){
  S.view = v;
  render();
}

// ===== RENDER =====
function render(){
  const m = document.getElementById('main');
  m.innerHTML = '';

  if(S.view === 'dashboard'){
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = '<h2>Dashboard</h2><p>App is working 🎉</p>';
    m.appendChild(d);
  }

  if(S.view === 'tasks'){
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = '<h2>Tasks</h2>';

    S.tasks.forEach(t=>{
      const row = document.createElement('div');
      row.textContent = t.title;
      d.appendChild(row);
    });

    m.appendChild(d);
  }
}

// INIT
document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
