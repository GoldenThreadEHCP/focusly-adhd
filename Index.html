<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focusly — ADHD Support</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#FDF8F2;font-family:'DM Sans','Segoe UI',sans-serif;color:#2E1F0F;min-height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#F2EBE0}
::-webkit-scrollbar-thumb{background:#E4D8C8;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .35s ease both}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ── Layout ── */
#app{display:flex;min-height:100vh;position:relative}

/* Sidebar */
#sidebar{
width:220px;background:#F2EBE0;border-right:1px solid #E4D8C8;
display:flex;flex-direction:column;padding:24px 0;
height:100vh;position:fixed;top:0;left:0;z-index:200;
overflow-y:auto;overflow-x:hidden;
transform:translateX(0);
transition:transform .28s cubic-bezier(.4,0,.2,1), width .28s cubic-bezier(.4,0,.2,1), box-shadow .28s;
}
#sidebar.hidden{transform:translateX(-220px)}
#sidebar.floating{box-shadow:4px 0 24px rgba(60,30,10,.14)}

/* When pinned, main shifts right. When not pinned, main fills full width */
#main{
flex:1;padding:32px 36px;max-width:900px;overflow-y:auto;
transition:margin-left .28s cubic-bezier(.4,0,.2,1);
margin-left:220px;
}
body.sb-hidden #main{margin-left:0}

/* Overlay (unpinned open state on click) */
#sb-overlay{
display:none;position:fixed;inset:0;z-index:199;background:rgba(30,15,5,.25);
backdrop-filter:blur(1px);
}
#sb-overlay.show{display:block}

/* Toggle button — always visible, sticks to left edge */
#sb-toggle{
position:fixed;top:18px;left:12px;z-index:300;
width:36px;height:36px;border-radius:10px;border:1px solid #E4D8C8;
background:#F2EBE0;cursor:pointer;display:flex;align-items:center;justify-content:center;
transition:left .28s cubic-bezier(.4,0,.2,1), background .15s;
box-shadow:0 2px 8px rgba(60,30,10,.1);
}
#sb-toggle:hover{background:#E4D8C8}
body.sb-hidden #sb-toggle{left:12px}
body:not(.sb-hidden) #sb-toggle{left:232px}

/* Pin button inside sidebar header */
#sb-pin{
width:28px;height:28px;border-radius:8px;border:1px solid #E4D8C8;
background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
transition:background .15s, border-color .15s;margin-left:auto;flex-shrink:0;
}
#sb-pin:hover{background:#E4D8C8}
#sb-pin.pinned{background:#FAEADE;border-color:#C4714A}

/* Sidebar internals */
.sb-brand{padding:0 20px 24px;display:flex;align-items:center;gap:10px}
.sb-icon{width:34px;height:34px;background:#C4714A;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-name{font-family:‘Lora’,Georgia,serif;font-weight:700;font-size:16px;color:#2E1F0F}
.sb-sub{font-size:11px;color:#A08B76}
.sb-nav{flex:1;padding:0 12px;display:flex;flex-direction:column;gap:2px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:none;cursor:pointer;width:100%;text-align:left;background:transparent;color:#6B5240;font-family:‘DM Sans’,‘Segoe UI’,sans-serif;font-weight:400;font-size:14px;transition:all .15s ease}
.nav-btn:hover{background:#E4D8C8}
.nav-btn.active{background:#FAEADE;color:#9E5636;font-weight:600}
.sb-footer{padding:16px 20px;border-top:1px solid #E4D8C8;font-size:11px;color:#A08B76;line-height:1.5}

/* Card */
.card{background:#fff;border-radius:16px;border:1px solid #E4D8C8;box-shadow:0 2px 12px rgba(60,30,10,.08)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;font-family:‘DM Sans’,‘Segoe UI’,sans-serif;font-weight:500;cursor:pointer;transition:opacity .18s;border:none;font-size:14px;padding:10px 20px}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#C4714A;color:#fff}
.btn-secondary{background:#F2EBE0;color:#2E1F0F;border:1px solid #E4D8C8}
.btn-ghost{background:transparent;color:#6B5240}
.btn-green{background:#4E8B6A;color:#fff}
.btn-sm{padding:6px 14px!important;font-size:13px!important}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.04em}

/* Inputs */
input[type=text],input[type=password],textarea,select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #E4D8C8;background:#FDF8F2;font-family:‘DM Sans’,‘Segoe UI’,sans-serif;font-size:14px;color:#2E1F0F;outline:none;transition:border-color .2s}
input[type=text]:focus,input[type=password]:focus,textarea:focus{border-color:#C4714A}
input[type=time]{padding:8px 12px;border-radius:8px;border:1px solid #E4D8C8;background:#FDF8F2;font-family:‘DM Sans’,‘Segoe UI’,sans-serif;font-size:16px;color:#2E1F0F;outline:none}
textarea{resize:vertical}

/* Toggle */
.tog{width:44px;height:24px;border-radius:999px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog-dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(30,15,5,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.modal-box{background:#fff;border-radius:20px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(60,30,10,.12);animation:fadeUp .3s ease}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #E4D8C8}
.modal-head h3{font-family:‘Lora’,Georgia,serif;font-size:18px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:#A08B76;padding:4px;display:flex;align-items:center}
.modal-body{padding:20px 24px}

/* Checkbox */
.cb{width:22px;height:22px;border-radius:6px;border:2px solid #E4D8C8;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb.on{background:#4E8B6A;border-color:#4E8B6A}
.cb-sm{width:18px;height:18px;border-radius:4px}

/* Icon button */
.icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid #E4D8C8;background:#FDF8F2;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.icon-btn:hover{background:#F2EBE0}

/* Tip pill */
.tip-pill{padding:6px 12px;border-radius:999px;border:1px solid #E4D8C8;background:#FDF8F2;font-size:12px;color:#6B5240;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:‘DM Sans’,sans-serif;transition:background .15s}
.tip-pill:hover{background:#F2EBE0}

/* Progress */
.prog-track{flex:1;height:4px;border-radius:2px;background:#E4D8C8}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* Subtask */
.sub-item{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:8px 10px;border-radius:8px;border:1px solid #E4D8C8;transition:all .15s}

@media(max-width:700px){#main{padding:16px;max-width:100%}body.sb-hidden #sb-toggle{left:12px}body:not(.sb-hidden) #sb-toggle{left:12px}}
</style>

</head>

<!-- Overlay for unpinned state -->

<div id="sb-overlay" onclick="sbToggle()"></div>

<div id="app">

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 007 4.5v.05A2.5 2.5 0 004.55 7H4.5A2.5 2.5 0 002 9.5v1A2.5 2.5 0 004.5 13h.05A2.5 2.5 0 007 15.5v.05A2.5 2.5 0 009.5 18H10v1a1 1 0 002 0v-1h.5A2.5 2.5 0 0015 15.55V15.5A2.5 2.5 0 0017.5 13h.05A2.5 2.5 0 0020 10.5v-1A2.5 2.5 0 0017.5 7h-.05A2.5 2.5 0 0015 4.55V4.5A2.5 2.5 0 0012.5 2h-3z"/></svg>

<script>
// ─── SVG icon helper ──────────────────────────────────────────────────────────
const IC={
  info:`<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>`,
  plus:`<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,

  trash:`<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/>`,
  chevD:`<polyline points="6 9 12 15 18 9"/>`,
  chevR:`<polyline points="9 18 15 12 9 6"/>`,
  play:`<polygon points="5 3 19 12 5 21 5 3"/>`,
  pause:`<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`,
  refresh:`<polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/>`,
  cal:`<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>`,
  close:`<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`,
  capture:`<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>`,
  star:`<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>`,
};
const ic=(n,sz=18,col='currentColor',st='')=>`<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="${st}">${IC[n]||''}</svg>`;

// ─── State ────────────────────────────────────────────────────────────────────
const S={
view:‘dashboard’, energy:null, showCapture:false,
tasks:[
{id:1,title:‘Complete monthly report’,notes:‘For team meeting’,dueDate:‘Today’,done:false,
subtasks:[{id:11,title:‘Gather data from spreadsheet’,done:true},{id:12,title:‘Write summary paragraph’,done:false},{id:13,title:‘Send to manager’,done:false}]},

{id:4,title:‘Renew car insurance’,notes:‘Due end of month’,dueDate:’’,done:true,subtasks:[]},
],
expandedTask:null,
captures:[{id:1,text:‘Call Mum on Sunday’},{id:2,text:‘Look into ADHD coaching referral’}],
reminders:[
{id:1,emoji:‘💊’,label:‘Medication’, time:‘08:00’,   repeat:‘Daily’,   active:true},
{id:2,emoji:‘💧’,label:‘Hydration’,  time:‘Every 2h’,repeat:‘Daily’,   active:true},
{id:3,emoji:‘🔑’,label:‘Keys check’, time:‘07:45’,   repeat:‘Weekdays’,active:true},
{id:4,emoji:‘🏃’,label:‘School run’, time:‘15:15’,   repeat:‘Weekdays’,active:false},
{id:5,emoji:‘😴’,label:‘Wind down’,  time:‘21:30’,   repeat:‘Daily’,   active:false},
],
projects:[
{id:1,name:‘Home Renovation’,  emoji:‘🏠’,color:’#C89030’,cLight:’#FBF2DC’,tasks:8, notes:‘Bathroom first’},
{id:2,name:‘Job Applications’, emoji:‘💼’,color:’#7065A8’,cLight:’#ECEAF8’,tasks:5, notes:‘CV draft done’},

],

timerIv:null,

strat:[
{id:‘s1’,label:‘Screen-free 60 mins before bed’,on:true},
{id:‘s2’,label:‘Cool room (16–18°C)’,            on:false},
{id:‘s3’,label:‘Consistent wind-down routine’,   on:true},
{id:‘s4’,label:‘Single alarm only (no snoozing)’,on:false},
{id:‘s5’,label:‘White/brown noise for sleep’,    on:true},
],
list:[
{id:0,label:‘Alarm off ✅’,done:false},{id:1,label:‘Stretch 2 minutes’,done:false},
{id:2,label:‘Drink water’,done:false}, {id:3,label:‘Medication’,done:false},
{id:4,label:‘Open curtains’,done:false},{id:5,label:‘Quick shower’,done:false},
{id:6,label:‘Bag check’,done:false},   {id:7,label:‘Breakfast’,done:false},
],
},
breathIv:null,
};

const TIPS={
initiation:{title:‘Task Initiation Strategies’,color:’#C89030’,bg:’#FBF2DC’,
tips:[‘⚡ 2-Minute Rule: If it takes under 2 minutes, do it now.’,‘🚪 Body Double: Work alongside someone (in person or virtually).’,‘🎵 Use a specific playlist you only play when working.’,‘⏱️ Set a 5-minute timer just to “start” — stopping is allowed.’,‘📍 Anchor to an existing habit (after coffee → start task).’,‘🔔 Implementation intention: “When X happens, I will do Y”.’],
source:‘CHADD, ADDitude Magazine, NICE NG87’},
overwhelm:{title:‘Overwhelm Reduction’,color:’#C45A7A’,bg:’#FAEAF0’,
tips:[‘🧩 Break task into the smallest possible first step.’,‘📝 Write ALL subtasks out — externalise the mental load.’,‘🎯 Choose ONE thing to do right now. Just one.’,‘😮‍💨 Box breathing: 4s in → 4s hold → 4s out → 4s hold.’,‘🏃 Move your body first if frozen — even a short walk helps.’,‘💬 Say aloud what you're about to do before you do it.’],
source:‘ADHD Foundation, ADDitude Magazine’},
timeBlindness:{title:‘Time-Blindness Strategies’,color:’#7065A8’,bg:’#ECEAF8’,
tips:[‘⏰ Use visible, analogue timers on your desk.’,‘📅 Time block your calendar with buffer zones between tasks.’,‘🔔 Set reminders 15 min AND 5 min before everything.’,‘📱 Use interval timers to resurface regularly.’,‘✍️ Estimate task time, then triple it (the “3× rule”).’,‘🗓️ Review tomorrow's schedule every evening.’],
source:‘Dr. Russell Barkley – ADHD & Time Management, CHADD’},
environment:{title:‘Environment Setup’,color:’#4E8B6A’,bg:’#E0F0E8’,
tips:[‘🎧 Noise-cancelling headphones or brown/white noise.’,‘📵 Put phone in another room or use app blockers.’,‘💡 Bright, cool-toned lighting for focus tasks.’,‘🌡️ Cooler room temperature tends to aid concentration.’,‘🗂️ Clear desk of everything not related to current task.’,‘🌿 A plant or natural element can reduce stress.’],
source:‘ADHD UK, ADDitude Magazine’},
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
function navigate(v){
S.view=v;
document.querySelectorAll(’.nav-btn’).forEach(b=>b.classList.toggle(‘active’,b.dataset.view===v));
renderMain();
}
function render(){
document.querySelectorAll(’.nav-btn’).forEach(b=>b.classList.toggle(‘active’,b.dataset.view===S.view));
renderMain();
}
function renderMain(){
const m=document.getElementById(‘main’);m.innerHTML=’’;
const fn={dashboard:vDash,tasks:vTasks,projects:vProjects,focus:vFocus,reminders:vReminders,sleep:vSleep,toolkit:vToolkit}[S.view];
if(fn)m.appendChild(fn());
}

// DOM factories
function div(st,html=’’){const d=document.createElement(‘div’);if(st)Object.assign(d.style,st);if(html)d.innerHTML=html;return d;}
function p(st,txt){const e=document.createElement(‘p’);Object.assign(e.style,st);e.textContent=txt;return e;}
function h(tag,st,html=’’){const e=document.createElement(tag);if(st)Object.assign(e.style,st);if(html)e.innerHTML=html;return e;}
function card(st={}){const d=document.createElement(‘div’);d.className=‘card’;Object.assign(d.style,st);return d;}
function badge(txt,color,bg){const s=document.createElement(‘span’);s.className=‘badge’;s.style.color=color;s.style.background=bg;s.textContent=txt;return s;}
function mkbtn(html,cls,onclick){const b=document.createElement(‘button’);b.className=‘btn ‘+cls;b.innerHTML=html;b.onclick=onclick;return b;}
function iconBtn(name,onclick){const b=document.createElement(‘button’);b.className=‘icon-btn’;b.innerHTML=ic(name,13,’#A08B76’);b.onclick=onclick;return b;}
function toggle(active,onclick,activeCol=’#4E8B6A’){
const w=document.createElement(‘button’);w.className=‘tog’;w.style.background=active?activeCol:’#E4D8C8’;w.onclick=onclick;
const d=document.createElement(‘div’);d.className=‘tog-dot’;d.style.left=active?‘23px’:‘3px’;w.appendChild(d);return w;
}
function inp(ph,val=’’){const i=document.createElement(‘input’);i.type=‘text’;i.placeholder=ph;i.value=val;return i;}
function ta(ph,val=’’,rows=3){const t=document.createElement(‘textarea’);t.placeholder=ph;t.value=val;t.rows=rows;t.style.width=‘100%’;return t;}
function wrap(cls,st={}){const d=document.createElement(‘div’);d.className=cls;Object.assign(d.style,st);return d;}

function showModal(title,width,fn){
document.getElementById(‘modal-root’).innerHTML=’’;
const bg=div({position:‘fixed’,inset:‘0’,background:‘rgba(30,15,5,.45)’,zIndex:‘1000’,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,padding:‘16px’,backdropFilter:‘blur(3px)’});
bg.className=‘modal-bg’;
bg.onclick=e=>{if(e.target===bg)closeModal();};
const box=document.createElement(‘div’);box.className=‘modal-box’;box.style.maxWidth=width+‘px’;
const head=document.createElement(‘div’);head.className=‘modal-head’;
head.innerHTML=`<h3>${title}</h3>`;
const cl=document.createElement(‘button’);cl.className=‘modal-close’;cl.innerHTML=ic(‘close’,20,’#A08B76’);cl.onclick=closeModal;
head.appendChild(cl);
const body=document.createElement(‘div’);body.className=‘modal-body’;
fn(body);
box.append(head,body);bg.appendChild(box);document.getElementById(‘modal-root’).appendChild(bg);
}
function closeModal(){document.getElementById(‘modal-root’).innerHTML=’’;}

function sleepDur(bed,wake){
const[bH,bM]=bed.split(’:’).map(Number),[wH,wM]=wake.split(’:’).map(Number);
let m=(wH*60+wM)-(bH*60+bM);if(m<0)m+=1440;return`${Math.floor(m/60)}h ${m%60}m`;
}

<circle id="farc" cx="100" cy="100" r="${R}" fill="none" stroke="${arcCol}" stroke-width="10" stroke-linecap="round" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${dash.toFixed(2)}" style="transition:stroke-dashoffset .5s ease"/>

[{label:‘Focus duration’,val:f.dur,opts:[15,20,25,30,45],fn:(v)=>{f.dur=v;if(f.mode===‘idle’)f.secs=v*60;render();}},

function startF(){
const f=S.focus;f.mode=‘running’;

f.secs–;
if(f.secs<=0){clearInterval(S.timerIv);if(f.mode===‘running’){f.cycle++;f.mode=‘break’;f.secs=f.brk*60;}else{f.mode=‘idle’;f.secs=f.dur*60;}render();return;}
const ft=document.getElementById(‘ftime’);if(ft)ft.textContent=`${Math.floor(f.secs/60).toString().padStart(2,'0')}:${(f.secs%60).toString().padStart(2,'0')}`;

},1000);render();
}
function pauseF(){S.focus.mode=‘paused’;clearInterval(S.timerIv);render();}

// ── Sidebar state ─────────────────────────────────────────────────────────────
const SB = {
open: true,   // currently visible
pinned: true, // pinned = sidebar pushes content; unpinned = floats as overlay
};

function sbInit() {
// Default: pinned open on desktop, hidden on mobile
if (window.innerWidth < 700) {
SB.open = false; SB.pinned = false;
applyBSB();
}
}

function applyBSB() {
const sidebar = document.getElementById(‘sidebar’);
const main    = document.getElementById(‘main’);
const overlay = document.getElementById(‘sb-overlay’);
const pin     = document.getElementById(‘sb-pin’);
const toggleBtn = document.getElementById(‘sb-toggle’);

if (SB.open) {
sidebar.classList.remove(‘hidden’);
if (SB.pinned) {
// Pinned: sidebar takes up space, no overlay
sidebar.classList.remove(‘floating’);
overlay.classList.remove(‘show’);
document.body.classList.remove(‘sb-hidden’);
main.style.marginLeft = ‘220px’;
toggleBtn.style.left = ‘232px’;
} else {
// Unpinned open: floats over content
sidebar.classList.add(‘floating’);
overlay.classList.add(‘show’);
document.body.classList.add(‘sb-hidden’);
main.style.marginLeft = ‘0’;
toggleBtn.style.left = ‘232px’;
}
} else {
// Hidden
sidebar.classList.add(‘hidden’);
sidebar.classList.remove(‘floating’);
overlay.classList.remove(‘show’);
document.body.classList.add(‘sb-hidden’);
main.style.marginLeft = ‘0’;
toggleBtn.style.left = ‘12px’;
}

// Pin button state
if (pin) {
pin.classList.toggle(‘pinned’, SB.pinned);
pin.title = SB.pinned ? ‘Unpin sidebar’ : ‘Pin sidebar open’;
// Update pin icon fill
const pinSvg = pin.querySelector(‘circle’);
if (pinSvg) pinSvg.setAttribute(‘fill’, SB.pinned ? ‘#C4714A’ : ‘none’);
}
}

function sbToggle() {
SB.open = !SB.open;
// When closing from unpinned state, keep pinned=false
applyBSB();
}

function sbPin() {
if (!SB.pinned) {
// Pin it: now pushes content, close overlay
SB.pinned = true;
SB.open = true;
} else {
// Unpin: sidebar still open but now floats
SB.pinned = false;
SB.open = true;
}
applyBSB();
}

// Close unpinned sidebar when a nav item is clicked
const _origNavigate = navigate;
// Wrap navigate to auto-close floating sidebar
function navigate(v) {
if (SB.open && !SB.pinned) {
SB.open = false;
applyBSB();
}
document.querySelectorAll(’.nav-btn’).forEach(b => b.classList.toggle(‘active’, b.dataset.view === v));
S.view = v;
renderMain();
}

document.addEventListener(‘DOMContentLoaded’, () => { sbInit(); render(); });

</script>
</body>
</html>
