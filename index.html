<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focusly — ADHD Support</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── THEME VARIABLES ──────────────────────────────────────── */
:root{
  --bg:#FDF8F2; --bg-alt:#F2EBE0; --card:#FFFFFF;
  --text:#2E1F0F; --mid:#6B5240; --muted:#A08B76;
  --accent:#C4714A; --alight:#FAEADE; --adark:#9E5636;
  --green:#4E8B6A; --glight:#E0F0E8;
  --purple:#7065A8; --plight:#ECEAF8;
  --amber:#C89030; --amlight:#FBF2DC;
  --rose:#C45A7A; --rlight:#FAEAF0;
  --border:#E4D8C8; --shadow:0 2px 12px rgba(60,30,10,.08);
  --shadow-lg:0 8px 32px rgba(60,30,10,.12);
}
body.dark{
  --bg:#1A1410; --bg-alt:#241C14; --card:#2E2218;
  --text:#F2E8D8; --mid:#C8A880; --muted:#8A7060;
  --accent:#E0875A; --alight:#3D2418; --adark:#F5B080;
  --green:#60A878; --glight:#1A3025;
  --purple:#9888D0; --plight:#261E38;
  --amber:#DEAA3A; --amlight:#302510;
  --rose:#D87090; --rlight:#301520;
  --border:#44322A; --shadow:0 2px 14px rgba(0,0,0,.4);
  --shadow-lg:0 8px 36px rgba(0,0,0,.6);
}

/* ── RESET & BASE ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;max-width:100%}
body{background:var(--bg);font-family:’DM Sans’,’Segoe UI’,sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .25s,color .25s}
body.dark{background:#1A1410 !important;color:#F2E8D8 !important}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg-alt)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.fade-up{animation:fadeUp .3s ease both}
.shake{animation:shake .4s ease}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ── LOGIN PAGE ───────────────────────────────────────────── */
#login-page{
display:none;position:fixed;inset:0;z-index:500;
background:var(--bg);align-items:center;justify-content:center;padding:20px;
}
#login-page.show{display:flex}
.login-card{
background:#FFFFFF;border-radius:24px;border:1px solid #E4D8C8;
box-shadow:0 8px 32px rgba(60,30,10,.12);width:100%;max-width:400px;padding:40px;
}
body.dark .login-card{background:#2E2218;border-color:#44322A}
.login-logo{width:48px;height:48px;background:var(--accent);border-radius:14px;
display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.login-title{font-family:‘Lora’,Georgia,serif;font-size:24px;font-weight:700;text-align:center;color:var(--text)}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin:6px 0 28px}
.login-field{margin-bottom:14px}
.login-label{font-size:12px;color:var(--mid);font-weight:600;display:block;margin-bottom:5px}
.login-input{
width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid #E4D8C8;
background:#FDF8F2;font-family:‘DM Sans’,sans-serif;font-size:14px;color:#2E1F0F;
outline:none;transition:border-color .2s;
}
body.dark .login-input{background:#1A1410;border-color:#44322A;color:#F2E8D8}
body.dark .login-input:focus{border-color:#E0875A}
.login-input:focus{border-color:var(--accent)}
.login-err{font-size:12px;color:var(--rose);margin-top:8px;min-height:16px;text-align:center}
.login-switch{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
.login-switch a{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:none}
.login-switch a:hover{text-decoration:underline}
.login-note{margin-top:20px;padding:10px 12px;border-radius:8px;background:var(--bg-alt);
font-size:11px;color:var(--muted);line-height:1.5;text-align:center}

/* ── APP SHELL ────────────────────────────────────────────── */
#app-shell{display:none}
#app-shell.show{display:block}

/* ── SIDEBAR ─────────────────────────────────────────────── */
#sidebar{
position:fixed;top:0;left:0;height:100vh;width:190px;z-index:200;
background:#F2EBE0;
border-right:1px solid #E4D8C8;
display:flex;flex-direction:column;padding:20px 0;
overflow-y:auto;overflow-x:hidden;
transition:transform .28s cubic-bezier(.4,0,.2,1);
will-change:transform;
}
#sidebar.collapsed{transform:translateX(-190px)}
#sidebar.floating{box-shadow:6px 0 32px rgba(30,15,5,.18)}
#sidebar{top:52px !important;height:calc(100vh - 52px) !important}
body.dark #sidebar{background:#241C14 !important;border-right-color:#44322A !important}
body.dark #sidebar.floating{box-shadow:6px 0 32px rgba(0,0,0,.55)}

/* ── OVERLAY ─────────────────────────────────────────────── */
#sb-overlay{display:none;position:fixed;inset:0;z-index:199;background:rgba(0,0,0,.35);backdrop-filter:blur(2px)}
#sb-overlay.show{display:block}

/* ── TOP BAR ─────────────────────────────────────────────── */
#top-bar{position:fixed;top:0;left:0;right:0;height:52px;z-index:250;display:flex;align-items:center;padding:0 12px;gap:10px;background:#FDF8F2;border-bottom:1px solid #E4D8C8;transition:background .25s;}
body.dark #top-bar{background:#1A1410 !important;border-bottom-color:#44322A !important}
#sb-toggle{width:36px;height:36px;border-radius:9px;border:1px solid #E4D8C8;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;color:#6B5240;}
#sb-toggle:hover{background:#F2EBE0}
body.dark #sb-toggle{border-color:#44322A;color:#C8A880}
body.dark #sb-toggle:hover{background:#241C14}
#top-bar-logo{width:28px;height:28px;background:#C4714A;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#top-bar-name{font-family:‘Lora’,Georgia,serif;font-size:15px;font-weight:700;color:#2E1F0F}
body.dark #top-bar-name{color:#F2E8D8}
#dark-btn{display:none !important}
/* ── MAIN ─────────────────────────────────────────────────── */
#main{min-height:100vh;padding:68px 24px 80px;max-width:860px;width:100%;transition:margin-left .28s cubic-bezier(.4,0,.2,1)}
#main{min-height:100vh;padding:32px 36px 60px;max-width:880px;transition:margin-left .28s cubic-bezier(.4,0,.2,1)}

/* ── SIDEBAR INTERNALS ───────────────────────────────────── */
.sb-brand{padding:0 14px 20px;display:flex;align-items:center;gap:9px}
.sb-logo{width:32px;height:32px;background:#C4714A;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-name{font-family:‘Lora’,Georgia,serif;font-weight:700;font-size:14px;color:#2E1F0F}
.sb-app-sub{font-size:10px;color:#A08B76}
body.dark .sb-name{color:#F2E8D8}
body.dark .sb-app-sub{color:#8A7060}
.sb-pin{width:24px;height:24px;border-radius:7px;border:1px solid #E4D8C8;background:transparent;
cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:auto;flex-shrink:0;
transition:all .15s;color:#A08B76}
.sb-pin:hover{background:#E4D8C8}
.sb-pin.on{background:#FAEADE;border-color:#C4714A;color:#C4714A}
body.dark .sb-pin{border-color:#44322A;color:#8A7060}
body.dark .sb-pin:hover{background:#3A2C20}
body.dark .sb-pin.on{background:#3D2418;border-color:#E0875A;color:#E0875A}
.sb-nav{flex:1;padding:0 8px;display:flex;flex-direction:column;gap:1px}
.nav-btn{
display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;border:none;
cursor:grab;width:100%;text-align:left;background:transparent;color:#6B5240;
font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:400;
transition:background .15s,color .15s;user-select:none;
}
.nav-btn:hover{background:#E4D8C8}
.nav-btn.active{background:#FAEADE;color:#9E5636;font-weight:600}
body.dark .nav-btn{color:#C8A880}
body.dark .nav-btn:hover{background:#3A2C20}
body.dark .nav-btn.active{background:#3D2418;color:#F5B080}
.nav-btn.drag-over{background:var(--alight);outline:2px dashed var(--accent)}
.nav-btn.dragging{opacity:.4}
.sb-foot{padding:14px 14px 0;border-top:1px solid #E4D8C8}
.sb-foot-tip{font-size:10px;color:#A08B76;line-height:1.5;margin-bottom:10px}
.sb-foot-actions{display:flex;gap:6px}
.sb-foot-btn{flex:1;padding:7px 6px;border-radius:8px;border:1px solid #E4D8C8;background:transparent;
cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:11px;color:#6B5240;
display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.sb-foot-btn:hover{background:#E4D8C8}
body.dark .sb-foot{border-top-color:#44322A}
body.dark .sb-foot-tip{color:#8A7060}
body.dark .sb-foot-btn{border-color:#44322A;color:#C8A880}
body.dark .sb-foot-btn:hover{background:#3A2C20}

/* ── CARDS ───────────────────────────────────────────────── */
.card{background:var(--card);border-radius:16px;border:1px solid var(--border);
box-shadow:var(--shadow);transition:background .25s,border-color .25s}
body.dark .card{background:#2E2218;border-color:#44322A}

/* Drag handle on sections */
.drag-section{position:relative}
.drag-section .drag-handle{
position:absolute;top:10px;right:10px;cursor:grab;font-size:15px;color:var(--muted);
opacity:0;transition:opacity .15s;z-index:5;line-height:1;
width:24px;height:24px;display:flex;align-items:center;justify-content:center;
border-radius:6px;background:var(--bg-alt);border:1px solid var(--border);
}
.drag-section:hover .drag-handle{opacity:1}
.drag-section.drag-over{outline:2px dashed var(--accent);border-radius:16px}
.drag-section.dragging{opacity:.45}

/* ── BUTTONS ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;
font-family:‘DM Sans’,sans-serif;font-weight:500;cursor:pointer;
transition:opacity .18s;border:none;font-size:14px;padding:10px 20px}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:#C4714A;color:#fff}
body.dark .btn-primary{background:#E0875A}
.btn-secondary{background:#F2EBE0;color:#2E1F0F;border:1px solid #E4D8C8}
body.dark .btn-secondary{background:#3A2C20;color:#F2E8D8;border-color:#44322A}
.btn-ghost{background:transparent;color:#6B5240}
body.dark .btn-ghost{color:#C8A880}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:6px 14px!important;font-size:13px!important}
.btn-danger{background:var(--rlight);color:var(--rose);border:1px solid var(--rose)}
.btn-full{width:100%;justify-content:center;margin-top:6px}

/* ── BADGE ───────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.04em}

/* ── INPUTS ──────────────────────────────────────────────── */
input[type=text],input[type=password],input[type=date],textarea,select{
width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #E4D8C8;
background:#FDF8F2;font-family:‘DM Sans’,sans-serif;font-size:14px;color:#2E1F0F;
outline:none;transition:border-color .2s}
input[type=text]:focus,input[type=password]:focus,input[type=date]:focus,textarea:focus,select:focus{border-color:#C4714A}
input[type=time],input[type=date]{padding:8px 12px;border-radius:8px;border:1.5px solid #E4D8C8;
background:#FDF8F2;font-family:‘DM Sans’,sans-serif;font-size:14px;color:#2E1F0F;outline:none;cursor:pointer}
textarea{resize:vertical}
select{cursor:pointer}
body.dark input[type=text],body.dark input[type=password],body.dark input[type=date],
body.dark textarea,body.dark select,body.dark input[type=time]
{background:#1A1410;border-color:#44322A;color:#F2E8D8}
body.dark input[type=text]:focus,body.dark input[type=date]:focus,body.dark textarea:focus
{border-color:#E0875A}

/* ── TOGGLE SWITCH ───────────────────────────────────────── */
.tog{width:44px;height:24px;border-radius:999px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.tog-dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s}

/* ── MODAL ───────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;
display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.modal-box{background:#FFFFFF;border-radius:20px;width:100%;max-height:88vh;
overflow-y:auto;box-shadow:0 8px 32px rgba(60,30,10,.12);animation:fadeUp .3s ease}
body.dark .modal-box{background:#2E2218;box-shadow:0 8px 36px rgba(0,0,0,.6)}
.modal-head{display:flex;align-items:center;justify-content:space-between;
padding:18px 22px;border-bottom:1px solid #E4D8C8}
body.dark .modal-head{border-bottom-color:#44322A}
.modal-head h3{font-family:‘Lora’,Georgia,serif;font-size:17px;font-weight:600;color:#2E1F0F}
body.dark .modal-head h3{color:#F2E8D8}
.modal-close{background:none;border:none;cursor:pointer;color:#A08B76;padding:4px;display:flex;align-items:center}
body.dark .modal-close{color:#8A7060}
.modal-body{padding:20px 22px}

/* ── CHECKBOX ────────────────────────────────────────────── */
.cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:transparent;
cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb.on{background:var(--green);border-color:var(--green)}
.cb-sm{width:18px;height:18px;border-radius:4px}

/* ── ICON BUTTON ─────────────────────────────────────────── */
.icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--bg);
cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;color:var(--muted)}
.icon-btn:hover{background:var(--bg-alt)}

/* ── TIP PILL ────────────────────────────────────────────── */
.tip-pill{padding:6px 12px;border-radius:999px;border:1px solid var(--border);background:var(--bg);
font-size:12px;color:var(--mid);cursor:pointer;display:inline-flex;align-items:center;gap:6px;
font-family:‘DM Sans’,sans-serif;transition:background .15s}
.tip-pill:hover{background:var(--bg-alt)}

/* ── CALENDAR CARD ───────────────────────────────────────── */
.cal-service{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
border:1px solid var(--border);background:var(--bg);margin-bottom:8px;transition:background .15s}
.cal-service:hover{background:var(--bg-alt)}
.cal-service-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
justify-content:center;font-size:20px;flex-shrink:0}
.cal-service-info{flex:1}
.cal-service-name{font-size:14px;font-weight:500;color:var(--text)}
.cal-service-desc{font-size:11px;color:var(--muted);margin-top:2px}

/* ── USER AVATAR ─────────────────────────────────────────── */
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);
display:flex;align-items:center;justify-content:center;color:#fff;
font-size:12px;font-weight:700;flex-shrink:0;cursor:pointer;
transition:opacity .2s;user-select:none}
.user-avatar:hover{opacity:.85}

@media(max-width:700px){
#main{padding:66px 12px 80px !important;max-width:100% !important}
.g2rc{grid-template-columns:1fr !important}
#sidebar{width:min(82vw,280px);max-width:280px}
#sidebar.collapsed{transform:translateX(-100%)}
#top-bar{padding:0 10px}
.task-acts{gap:2px !important}
.task-bd-label{display:none !important}
.task-row-top{flex-wrap:wrap !important}
}
@media(max-width:400px){
#main{padding:60px 10px 80px !important}
}
#dark-btn{top:14px;right:54px}
}

/* ── WIDGET SYSTEM ───────────────────────────────────────── */
.widget-bar{
display:flex;align-items:center;justify-content:space-between;
margin-bottom:8px;
}
.widget-edit-btn{
display:inline-flex;align-items:center;gap:6px;padding:6px 12px;
border-radius:20px;border:1.5px dashed #E4D8C8;background:transparent;
font-family:‘DM Sans’,sans-serif;font-size:12px;color:#A08B76;cursor:pointer;
transition:all .15s;
}
.widget-edit-btn:hover{background:#F2EBE0;border-color:#C4714A;color:#C4714A}
body.dark .widget-edit-btn{border-color:#44322A;color:#8A7060}
body.dark .widget-edit-btn:hover{background:#241C14;border-color:#E0875A;color:#E0875A}
.widget-drawer{
background:var(--card);border-radius:16px;border:2px dashed var(--border);
padding:16px;margin-bottom:4px;
}
body.dark .widget-drawer{background:#2E2218}
.widget-grid{
display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:12px;
}
.widget-chip{
display:flex;align-items:center;gap:8px;padding:10px 12px;
border-radius:10px;border:1.5px solid #E4D8C8;background:#FDF8F2;
cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:13px;
color:#2E1F0F;transition:all .15s;user-select:none;
}
.widget-chip:hover{border-color:#C4714A;background:#FAEADE}
.widget-chip.active{border-color:#C4714A;background:#FAEADE;color:#9E5636}
.widget-chip.active .wc-check{opacity:1}
.wc-check{opacity:0;margin-left:auto;transition:opacity .15s}
body.dark .widget-chip{background:#1A1410;border-color:#44322A;color:#F2E8D8}
body.dark .widget-chip:hover{border-color:#E0875A;background:#3D2418}
body.dark .widget-chip.active{background:#3D2418;border-color:#E0875A;color:#F5B080}
.drag-section .drag-handle{font-size:14px}

/* ── HABIT TRACKER ───────────────────────────────────────── */
.habit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:10px 12px;
border-radius:10px;background:var(--bg);border:1px solid var(--border)}
.habit-days{display:flex;gap:5px;margin-left:auto}
.habit-day{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);
background:transparent;cursor:pointer;font-size:10px;font-weight:700;
color:var(--muted);display:flex;align-items:center;justify-content:center;
transition:all .15s;font-family:‘DM Sans’,sans-serif}
.habit-day.done{background:var(--green);border-color:var(--green);color:#fff}

/* ── MOOD LOG ────────────────────────────────────────────── */
.mood-grid{display:flex;gap:8px;flex-wrap:wrap}
.mood-btn{padding:8px 14px;border-radius:999px;border:1.5px solid var(--border);
background:transparent;cursor:pointer;font-size:15px;transition:all .15s}
.mood-btn:hover,.mood-btn.sel{transform:scale(1.15)}
.mood-btn.sel{border-color:var(--accent);background:var(--alight)}

/* ── WATER TRACKER ───────────────────────────────────────── */
.water-cups{display:flex;gap:6px;flex-wrap:wrap}
.water-cup{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);
background:transparent;cursor:pointer;font-size:17px;display:flex;
align-items:center;justify-content:center;transition:all .15s}
.water-cup.filled{background:#DBEAFE;border-color:#3B82F6}

/* ── MUSIC WIDGET ────────────────────────────────────────── */
.music-service-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.ms-btn{flex:1;min-width:120px;display:flex;align-items:center;gap:8px;padding:10px 12px;
border-radius:10px;border:1.5px solid var(--border);background:var(--bg);
cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:13px;color:var(--text);
transition:all .15s;text-decoration:none}
.ms-btn:hover{border-color:var(--accent);background:var(--alight)}

/* ── BIOMETRIC LOGIN BTN ─────────────────────────────────── */
.bio-btn{
width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
padding:13px;border-radius:12px;border:1.5px solid #E4D8C8;background:#F2EBE0;
cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:15px;font-weight:500;
color:#2E1F0F;margin-bottom:12px;transition:all .2s;
}
.bio-btn:hover{border-color:#C4714A;background:#FAEADE;color:#9E5636}
body.dark .bio-btn{background:#241C14;border-color:#44322A;color:#F2E8D8}
body.dark .bio-btn:hover{border-color:#E0875A;background:#3D2418;color:#F5B080}
.bio-divider{display:flex;align-items:center;gap:10px;margin-bottom:16px;color:#A08B76;font-size:12px}
.bio-divider::before,.bio-divider::after{content:’’;flex:1;height:1px;background:#E4D8C8}

/* ── DAILY INTENTION ─────────────────────────────────────── */
.intention-input{

/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>',

// ════════════════════════════════════════════════════════
//  CLOUD SYNC (JSONBin.io — free cross-device sync)
// ════════════════════════════════════════════════════════
var JSONBIN_API='https://api.jsonbin.io/v3/b'; function getSyncState(){return JSON.parse(localStorage.getItem('focusly_sync')||'null');} function setSyncState(st){if(st)localStorage.setItem('focusly_sync',JSON.stringify(st));else localStorage.removeItem('focusly_sync');} function gatherSaveData(){return{v:4,tasks:S.tasks,captures:S.captures.map(function(c){return{id:c.id,text:c.text,file:c.file?{name:c.file.name,type:c.file.type}:undefined};}),reminders:S.reminders,projects:S.projects,focus:{sound:S.focus.sound,dur:S.focus.dur,brk:S.focus.brk},sleep:S.sleep,habits:S.habits||[],moodLog:S.moodLog||[],water:S.water||0,intention:S.intention||'',musicEmbed:S.musicEmbed||'',appleMusicEmbed:S.appleMusicEmbed||'',energy:S.energy,timeBlocks:S.timeBlocks||[],medsLog:S.medsLog||{},weatherMood:S.weatherMood||'',streaks:S.streaks||{focus:0,days:0},checklists:S.checklists||[],widgets:getActiveWidgets(),navOrder:NAV_ORDER,savedAt:new Date().toISOString()};} function restoreData(d){if(!d||!d.v)return;['tasks','captures','reminders','projects','sleep','habits','moodLog','timeBlocks','medsLog','checklists'].forEach(function(k){if(d[k])S[k]=d[k];});if(d.focus){S.focus.sound=d.focus.sound;S.focus.dur=d.focus.dur;S.focus.brk=d.focus.brk;}if(d.water!==undefined)S.water=d.water;if(d.intention)S.intention=d.intention;if(d.musicEmbed)S.musicEmbed=d.musicEmbed;if(d.appleMusicEmbed)S.appleMusicEmbed=d.appleMusicEmbed;if(d.energy)S.energy=d.energy;if(d.weatherMood)S.weatherMood=d.weatherMood;if(d.streaks)S.streaks=d.streaks;if(d.widgets)saveWidgets(d.widgets);if(d.navOrder){NAV_ORDER=d.navOrder;localStorage.setItem('focusly_nav_order',JSON.stringify(NAV_ORDER));}} function saveMediaLocally(){try{localStorage.setItem('focusly_voice',JSON.stringify((S.voiceNotes||[]).slice(0,20)));localStorage.setItem('focusly_meetings',JSON.stringify((S.meetings||[]).slice(0,10)));}catch(e){}} function loadMediaLocally(){try{S.voiceNotes=JSON.parse(localStorage.getItem('focusly_voice')||'[]');S.meetings=JSON.parse(localStorage.getItem('focusly_meetings')||'[]');}catch(e){S.voiceNotes=[];S.meetings=[];}} async function cloudPush(){
  var data=gatherSaveData(), sync=getSyncState();
  if(!sync||!sync.apiKey) return{ok:false,error:'Not configured'};
  var isAuthErr=function(msg){return msg&&(msg.toLowerCase().includes('invalid')||msg.toLowerCase().includes('access')||msg.toLowerCase().includes('belong')||msg.toLowerCase().includes('unauthori'));};
  try{
    var res,json;
    // Try updating existing bin
    if(sync.binId){
      res=await fetch(JSONBIN_API+'/'+sync.binId,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':sync.apiKey},body:JSON.stringify(data)});
      json=await res.json();
      if(res.ok) return{ok:true,binId:sync.binId};
      // Auth error or bin not found — clear binId and fall through to create
      if(isAuthErr(json.message)||res.status===401||res.status===403||res.status===404){
        setSyncState({binId:null,apiKey:sync.apiKey});
        sync=getSyncState();
        // fall through to create
      } else {
        throw new Error(json.message||'Update failed');
      }
    }
    // Create new bin
    res=await fetch(JSONBIN_API,{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':sync.apiKey,'X-Bin-Name':'Focusly-'+new Date().getFullYear(),'X-Bin-Private':'false'},body:JSON.stringify(data)});
    json=await res.json();
    if(!res.ok) throw new Error(json.message||'Create failed');
    setSyncState({binId:json.metadata.id,apiKey:sync.apiKey});
    return{ok:true,binId:json.metadata.id,created:true};
  }catch(e){return{ok:false,error:e.message};}
} async function cloudPull(binId,apiKey){try{var res=await fetch(JSONBIN_API+'/'+binId+'/latest',{headers:apiKey?{'X-Master-Key':apiKey}:{}});var json=await res.json();if(!res.ok)throw new Error(json.message||'Fetch failed');return{ok:true,data:json.record};}catch(e){return{ok:false,error:e.message};}} function exportDataJSON(){var blob=new Blob([JSON.stringify(gatherSaveData(),null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='focusly-backup.json';a.click();setTimeout(function(){URL.revokeObjectURL(url);},1000);} function importDataJSON(file){var reader=new FileReader();reader.onload=function(e){try{restoreData(JSON.parse(e.target.result));renderView();alert('✓ Data imported!');}catch(err){alert('Could not read file: '+err.message);}};reader.readAsText(file);}
var _syncTimer=null;
function scheduleSync(){var sy=getSyncState();if(!sy||!sy.binId)return;clearTimeout(_syncTimer);_syncTimer=setTimeout(function(){cloudPush();},4000);}
var _notifTimers=[];
function scheduleNotifications(){
  _notifTimers.forEach(function(t){clearTimeout(t);});_notifTimers=[];
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  var now=new Date();
  (S.reminders||[]).filter(function(r){return r.active&&r.time&&r.time.indexOf(':')>-1;}).forEach(function(r){
    var parts=r.time.split(':');var target=new Date();target.setHours(+parts[0],+parts[1],0,0);
    if(target<=now)target.setDate(target.getDate()+1);
    var delay=target.getTime()-now.getTime();
    if(delay>0&&delay<86400000){_notifTimers.push(setTimeout(function(){try{new Notification(r.emoji+' '+r.label,{body:'Focusly reminder — '+r.time,tag:'focusly-'+r.id,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="26" font-size="28">⏰</text></svg>'});}catch(er){}},delay));}
  });
}

// ════════════════════════════════════════════════════════
//  AUTH
// ════════════════════════════════════════════════════════
var AUTH_MODE = 'login'; // 'login' | 'register'

async function hashPw(pw) {   var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));   return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
} function getStoredUser() { return JSON.parse(localStorage.getItem('focusly_user')||'null'); } function getSession()    { return JSON.parse(sessionStorage.getItem('focusly_sess')||'null'); } function saveSession(u)  { sessionStorage.setItem('focusly_sess', JSON.stringify(u)); } function clearSession()  { sessionStorage.removeItem('focusly_sess'); }

function authToggle() {   AUTH_MODE = AUTH_MODE === 'login' ? 'register' : 'login';   var isReg = AUTH_MODE === 'register';   document.getElementById('login-title').textContent      = isReg ? 'Create account' : 'Welcome back';   document.getElementById('login-sub').textContent        = isReg ? 'Set up your Focusly account' : 'Sign in to your Focusly account';   document.getElementById('login-name-field').style.display = isReg ? 'block' : 'none';   document.getElementById('login-submit-btn').textContent = isReg ? 'Create account' : 'Sign in';   document.getElementById('login-switch-text').textContent = isReg ? 'Already have an account?' : "Don't have an account?"; document.getElementById('login-switch-link').textContent = isReg ? ' Sign in' : ' Create one';
   document.getElementById('login-err').textContent = '';
}

async function authSubmit() {   var email = document.getElementById('login-email').value.trim();   var pw    = document.getElementById('login-pw').value;   var name  = document.getElementById('login-name').value.trim();   var errEl = document.getElementById('login-err');   errEl.textContent = '';
   if (!email || !pw) { errEl.textContent = 'Please fill in all fields.'; return; }   if (pw.length < 6)  { errEl.textContent = 'Password must be at least 6 characters.'; return; }
   var btn2 = document.getElementById('login-submit-btn');   btn2.disabled = true; btn2.textContent = 'Please wait...';

  var hash = await hashPw(pw);
   if (AUTH_MODE === 'register') {     if (!name) { errEl.textContent = 'Please enter your name.'; btn2.disabled=false; btn2.textContent='Create account'; return; }
    var existing = getStoredUser();     if (existing && existing.email === email) { errEl.textContent = 'An account with that email already exists.'; btn2.disabled=false; btn2.textContent='Create account'; return; }
    var user = {name:name, email:email, hash:hash};     localStorage.setItem('focusly_user', JSON.stringify(user));
    saveSession(user);
    bootApp(user);
  } else {
    var stored = getStoredUser();
    if (!stored || stored.email !== email) {       var card = document.querySelector('.login-card');       card.classList.add('shake'); setTimeout(function(){card.classList.remove('shake');},500);       errEl.textContent = 'No account found with that email.'; btn2.disabled=false; btn2.textContent='Sign in'; return;
    }
    if (stored.hash !== hash) {       var card2 = document.querySelector('.login-card');       card2.classList.add('shake'); setTimeout(function(){card2.classList.remove('shake');},500);       errEl.textContent = 'Incorrect password.'; btn2.disabled=false; btn2.textContent='Sign in'; return;
    }
    saveSession(stored);
    bootApp(stored);
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {   if (e.key === 'Enter' && document.getElementById('login-page').classList.contains('show')) authSubmit();
});

function authLogout() {
  clearSession();
  document.getElementById('app-shell').classList.remove('show');
  document.getElementById('login-page').classList.add('show');   AUTH_MODE = 'login';   document.getElementById('login-title').textContent = 'Welcome back';   document.getElementById('login-sub').textContent = 'Sign in to your Focusly account';   document.getElementById('login-name-field').style.display = 'none';   document.getElementById('login-submit-btn').textContent = 'Sign in';   document.getElementById('login-submit-btn').disabled = false;   document.getElementById('login-err').textContent = '';   document.getElementById('login-email').value = '';   document.getElementById('login-pw').value = '';
}

var DARK = localStorage.getItem('focusly_dark') === '1';
 function applyTheme(){if(DARK)document.body.classList.add('dark');else document.body.classList.remove('dark');}
function toggleDark() {
  DARK = !DARK;   localStorage.setItem('focusly_dark', DARK ? '1' : '0');
  applyTheme();
  // Re-render so all JS-built elements pick up new CSS variables
  renderView();
}

// ════════════════════════════════════════════════════════

function bioAvailable() {
  return !!(window.PublicKeyCredential && navigator.credentials && navigator.credentials.create);
}
function showBioButton() {
  var stored = getStoredUser();   var hasCred = localStorage.getItem('focusly_biocred');   var bioSec = document.getElementById('bio-section');
  if (!bioSec) return;
  if (bioAvailable() && stored) {     bioSec.style.display = 'block';
    if (hasCred) {       document.getElementById('bio-label').textContent = 'Sign in with Face ID / Touch ID';       document.getElementById('bio-icon').textContent = '🔒';
    } else {       document.getElementById('bio-label').textContent = 'Set up Face ID / Touch ID';       document.getElementById('bio-icon').textContent = '👤';
    }
  }
}
async function bioRegister(userId) {
  if (!bioAvailable()) return;
  try {
    var challenge = crypto.getRandomValues(new Uint8Array(32));
    var cred = await navigator.credentials.create({
      publicKey: {
        challenge: challenge,         rp: { name: 'Focusly', id: window.location.hostname || 'localhost' },
        user: {
          id: new TextEncoder().encode(userId),           name: userId, displayName: 'Focusly User'
        },         pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
        authenticatorSelection: {           authenticatorAttachment: 'platform',           userVerification: 'required',           residentKey: 'preferred'
        },
        timeout: 60000,         attestation: 'none'
      }
    });     localStorage.setItem('focusly_biocred', JSON.stringify({
      id: Array.from(new Uint8Array(cred.rawId)),
      type: cred.type
    }));
    showBioButton();
    return true;
  } catch(e) {
    return false;
  }
}
async function bioLogin() {
  var stored = getStoredUser();   var hasCred = localStorage.getItem('focusly_biocred');   if (!stored) { alert('No account found. Please sign in with password first.'); return; }
  if (!hasCred) {
    // Register biometrics
    var ok = await bioRegister(stored.email);
    if (ok) {       var errEl = document.getElementById('login-err');       errEl.style.color = 'var(--green)';       errEl.textContent = '✓ Face ID / Touch ID set up! Tap the button again to use it.';
    } else {       document.getElementById('login-err').textContent = 'Biometric setup failed or not supported on this device.';
    }
    return;
  }
  try {
    var credData = JSON.parse(hasCred);
    var challenge = crypto.getRandomValues(new Uint8Array(32));
    var assertion = await navigator.credentials.get({
      publicKey: {
        challenge: challenge,         allowCredentials: [{ id: new Uint8Array(credData.id).buffer, type: 'public-key' }],         userVerification: 'required',

function pad2(n){return String(n).padStart(2,'0');}
function icsDate(dateObj){   return dateObj.getFullYear()+pad2(dateObj.getMonth()+1)+pad2(dateObj.getDate())+'T'+pad2(dateObj.getHours())+pad2(dateObj.getMinutes())+'00';

function exportICS(remindersArr) {   var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Focusly//ADHD Support//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  remindersArr.filter(function(r){return r.active;}).forEach(function(r){
    var now=new Date(); var start=new Date();     if(r.time && r.time.includes(':')){ var parts=r.time.split(':'); start.setHours(+parts[0],+parts[1],0); }
    if(start<now) start.setDate(start.getDate()+1);

  });   lines.push('END:VCALENDAR');   var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);   var a=document.createElement('a'); a.href=url; a.download='focusly-reminders.ics'; a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

  if(start<now) start.setDate(start.getDate()+1);
